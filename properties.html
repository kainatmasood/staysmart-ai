<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Properties - StaySmart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; padding-top: 70px; }
        .navbar { background: #1a1a2e; padding: 1rem 0; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-brand { color: white; font-size: 1.5rem; font-weight: bold; }
        .navbar-brand i { color: #4f46e5; }
        .nav-link { color: white !important; }
        .btn-gradient { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 8px 20px; border-radius: 25px; }
        .page-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 60px 0; text-align: center; }
        .filters-card { background: white; border-radius: 20px; padding: 25px; margin-top: -40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .property-card { background: white; border-radius: 15px; overflow: hidden; transition: 0.3s; margin-bottom: 25px; cursor: pointer; }
        .property-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .property-image { height: 200px; background-size: cover; background-position: center; }
        .property-info { padding: 20px; }
        .property-price { color: #667eea; font-size: 1.3rem; font-weight: bold; }
        .footer { background: #1a1a2e; color: white; padding: 40px 0; margin-top: 50px; }
        .toast-notification { position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 250px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fas fa-robot"></i> StaySmart AI</a>
        <div>
            <a href="index.html" class="nav-link d-inline-block me-3">Home</a>
            <a href="dashboard.html" class="nav-link d-inline-block me-3">Dashboard</a>
            <a href="#" class="btn-gradient" data-bs-toggle="modal" data-bs-target="#loginModal">Login</a>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container">
        <h1>Find Your Perfect Property</h1>
        <p>Discover thousands of long-term rental options with AI-powered recommendations</p>
    </div>
</section>

<div class="container">
    <div class="filters-card">
        <div class="row g-3">
            <div class="col-md-4"><input type="text" class="form-control" id="location" placeholder="📍 Location"></div>
            <div class="col-md-3"><input type="number" class="form-control" id="maxBudget" placeholder="Max Budget (PKR)"></div>
            <div class="col-md-3"><select class="form-select" id="propertyType"><option value="">All Types</option><option>Apartment</option><option>House</option><option>Studio</option></select></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="searchProperties()"><i class="fas fa-search"></i> Search</button></div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-6"><h3><span id="resultCount">0</span> properties found</h3></div>
        <div class="col-md-6 text-end">
            <select class="form-select w-auto d-inline-block" onchange="sortProperties(this.value)">
                <option>Sort by: Recommended</option>
                <option>Price: Low to High</option>
                <option>Price: High to Low</option>
            </select>
        </div>
    </div>
    <div id="propertiesGrid" class="row g-4">
        <div class="col-12 text-center"><div class="spinner-border text-primary"></div><p>Loading properties...</p></div>
    </div>
</div>

<footer class="footer">
    <div class="container text-center"><p>&copy; 2024 StaySmart AI. All rights reserved.</p></div>
</footer>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Login</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="mb-3"><input type="email" class="form-control" id="loginEmail" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" class="form-control" id="loginPassword" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center">Don't have an account? <a href="#" data-bs-toggle="modal" data-bs-target="#registerModal">Register</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = 'http://localhost/StaySmart-AI/backend/api';
    let allProperties = [];

    async function loadProperties() {
        try {
            const response = await fetch(`${API_BASE}/properties.php`);
            const data = await response.json();
            if (data.status && data.data) {
                allProperties = data.data;
                displayProperties(allProperties);
            } else {
                loadSampleProperties();
            }
        } catch (error) {
            loadSampleProperties();
        }
    }

    function loadSampleProperties() {
        allProperties = [
            { property_id:1, property_name:"Cozy Studio", location:"Islamabad", price_monthly:35000, bedrooms:1, bathrooms:1, image_url:"https://images.unsplash.com/photo-1522708323590-d24dbb6b0267" },
            { property_id:2, property_name:"Modern Apartment", location:"Islamabad", price_monthly:55000, bedrooms:2, bathrooms:2, image_url:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" },
            { property_id:3, property_name:"Luxury House", location:"Lahore", price_monthly:85000, bedrooms:3, bathrooms:3, image_url:"https://images.unsplash.com/photo-1564013799919-ab600027ffc6" }
        ];
        displayProperties(allProperties);
    }

    function displayProperties(properties) {
        const grid = document.getElementById('propertiesGrid');
        document.getElementById('resultCount').innerText = properties.length;
        grid.innerHTML = properties.map(p => `
            <div class="col-md-4">
                <div class="property-card" onclick="viewProperty(${p.property_id})">
                    <div class="property-image" style="background-image: url('${p.image_url}')"></div>
                    <div class="property-info">
                        <h5>${p.property_name}</h5>
                        <p><i class="fas fa-map-marker-alt"></i> ${p.location}</p>
                        <div class="property-price">Rs. ${parseInt(p.price_monthly).toLocaleString()}/month</div>
                        <div><i class="fas fa-bed"></i> ${p.bedrooms} bed <i class="fas fa-bath"></i> ${p.bathrooms} bath</div>
                        <button class="btn btn-outline-primary w-100 mt-2">View Details</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function searchProperties() {
        const location = document.getElementById('location').value;
        const maxBudget = document.getElementById('maxBudget').value;
        let filtered = [...allProperties];
        if (location) filtered = filtered.filter(p => p.location.toLowerCase().includes(location.toLowerCase()));
        if (maxBudget) filtered = filtered.filter(p => p.price_monthly <= parseInt(maxBudget));
        displayProperties(filtered);
        showNotification(`Found ${filtered.length} properties`, 'success');
    }

    function sortProperties(value) {
        if (value.includes('Low to High')) allProperties.sort((a,b) => a.price_monthly - b.price_monthly);
        else if (value.includes('High to Low')) allProperties.sort((a,b) => b.price_monthly - a.price_monthly);
        else allProperties.sort((a,b) => b.property_id - a.property_id);
        displayProperties(allProperties);
    }

    function viewProperty(id) { window.location.href = 'dashboard.html'; }
    function showNotification(msg, type) { alert(msg); }

    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/login.php`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value })
        });
        const data = await response.json();
        if (data.status) {
            localStorage.setItem('staySmartUser', JSON.stringify(data.data));
            window.location.href = 'dashboard.html';
        } else alert('Login failed');
    });

    loadProperties();
</script>
</body>
</html>
