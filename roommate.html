<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Roommate - StaySmart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; padding-top: 70px; }
        .navbar { background: #1a1a2e; padding: 1rem 0; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-brand { color: white !important; font-size: 1.5rem; font-weight: bold; }
        .navbar-brand i { color: #4f46e5; margin-right: 8px; }
        .nav-link { color: white !important; }
        .btn-login { background: #4f46e5; color: white; border-radius: 25px; padding: 8px 25px; }
        .page-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 60px 0; text-align: center; }
        .form-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .match-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .match-score { background: #10b981; color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; font-weight: bold; }
        .footer { background: #1a1a2e; color: white; padding: 40px 0 20px; margin-top: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-robot"></i> StaySmart AI</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="properties.html">Properties</a></li>
                    <li class="nav-item"><a class="nav-link" href="roommate.html">Roommate</a></li>
                    <li class="nav-item"><a class="btn btn-login" href="#" data-bs-toggle="modal" data-bs-target="#loginModal">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Find Your Perfect Roommate</h1>
            <p>AI-powered matching based on budget, lifestyle, and preferences</p>
        </div>
    </section>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="form-card">
                    <h4><i class="fas fa-user-plus"></i> Create Request</h4>
                    <div class="mb-3"><input type="number" class="form-control" id="budgetMin" placeholder="Min Budget"></div>
                    <div class="mb-3"><input type="number" class="form-control" id="budgetMax" placeholder="Max Budget"></div>
                    <div class="mb-3"><input type="text" class="form-control" id="location" placeholder="Preferred Location"></div>
                    <div class="mb-3"><select class="form-select" id="lifestyle"><option>Quiet</option><option>Social</option><option>Balanced</option></select></div>
                    <button class="btn btn-primary w-100" onclick="findRoommates()">Find Matches</button>
                </div>
            </div>
            <div class="col-md-8">
                <div id="matchesContainer">
                    <div class="alert alert-info">Create a roommate request to see matches!</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2024 StaySmart AI. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function findRoommates() {
            const matches = [
                { name: "Ahmed Khan", budget: 45000, lifestyle: "Quiet", occupation: "Software Engineer", match: 92 },
                { name: "Sara Ali", budget: 50000, lifestyle: "Balanced", occupation: "Medical Student", match: 88 },
                { name: "Usman Riaz", budget: 40000, lifestyle: "Professional", occupation: "Banker", match: 85 }
            ];
            
            const container = document.getElementById('matchesContainer');
            container.innerHTML = `<h4>Top Matches (${matches.length} found)</h4>` + 
                matches.map(m => `
                    <div class="match-card">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5><i class="fas fa-user-circle"></i> ${m.name}</h5>
                                <div>Budget: Rs. ${m.budget.toLocaleString()} | Lifestyle: ${m.lifestyle} | ${m.occupation}</div>
                            </div>
                            <div class="text-end">
                                <div class="match-score">${m.match}% Match</div>
                                <button class="btn btn-sm btn-primary mt-2" onclick="connect(${m.match})">Connect</button>
                            </div>
                        </div>
                    </div>
                `).join('');
        }
        
        function connect(id) { alert("Connection request sent!"); }
    </script>
</body>
</html>
